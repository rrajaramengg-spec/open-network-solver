[alembic]
# Migration scripts directory (relative to this file)
script_location = alembic

# Use timestamped revision IDs for chronological ordering in PRs
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for revision timestamps (UTC keeps PR diffs stable across reviewers)
timezone = UTC

# Allow custom branch labels; keep monolithic for now (single linear history)
revision_environment = false

# DB URL is set programmatically in alembic/env.py from pydantic-settings.
# Leave blank here so misconfiguration fails loudly instead of using a default.
sqlalchemy.url =

# Logging — alembic's defaults are noisy; route through our structured logger
# by reusing the root config in env.py.

[post_write_hooks]
# Auto-format generated migrations
hooks = ruff_format ruff_check
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME
ruff_check.type = console_scripts
ruff_check.entrypoint = ruff
ruff_check.options = check --fix --exit-zero REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = INFO
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
